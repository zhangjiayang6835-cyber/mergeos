name: Bounty claim
description: Claim approved bounty work before opening a PR.
title: "claim: "
labels:
  - bounty
body:
  - type: markdown
    attributes:
      value: |
        Claim the bounty before starting work. Maintainers may reject duplicate, unapproved, or out-of-scope claims.
  - type: input
    id: bounty_issue
    attributes:
      label: Bounty issue
      description: Link the bounty or issue you want to claim.
      placeholder: "https://github.com/mergeos-bounties/mergeos/issues/..."
    validations:
      required: true
  - type: dropdown
    id: bounty_type
    attributes:
      label: Bounty type
      options:
        - Bug bounty
        - Feature bounty
        - Documentation
        - Security
        - Other
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Planned approach
      description: Explain the implementation plan and files or areas you expect to touch.
    validations:
      required: true
  - type: textarea
    id: evidence_plan
    attributes:
      label: Evidence plan
      description: What screenshots, logs, tests, or command output will you include in the PR?
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I starred this repository before claiming.
          required: true
        - label: I understand that unconfirmed or duplicate claims are not guaranteed to be reviewed for reward.
          required: true
        - label: I will link this claim in my PR.
          required: true
        - label: I will not include secrets, private keys, customer data, or sensitive production details.
          required: true
