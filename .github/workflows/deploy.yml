name: Build and deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Build backend
        working-directory: backend
        run: |
          mkdir -p dist
          go build -o dist/mergeos ./cmd/mergeos

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package release
        run: |
          mkdir -p release/frontend
          cp backend/dist/mergeos release/mergeos
          cp -R frontend/dist/. release/frontend/
          tar -czf mergeos-release.tar.gz -C release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mergeos-release
          path: mergeos-release.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: mergeos-release

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PASSWORD"
          test -n "$DEPLOY_PORT"

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: DEPLOY_PATH
          script: |
            set -e
            APP_DIR="${DEPLOY_PATH:-$HOME/mergeos}"
            mkdir -p "$APP_DIR"

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: mergeos-release.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: DEPLOY_PATH
          script: |
            set -e
            APP_DIR="${DEPLOY_PATH:-$HOME/mergeos}"
            cd "$APP_DIR"
            rm -rf frontend
            tar -xzf mergeos-release.tar.gz
            chmod +x mergeos
            if command -v systemctl >/dev/null 2>&1; then
              SERVICE_DIR="$HOME/.config/systemd/user"
              SERVICE_FILE="$SERVICE_DIR/mergeos.service"
              mkdir -p "$SERVICE_DIR"
              loginctl enable-linger "$USER" 2>/dev/null || true
              cat > "$SERVICE_FILE" <<SERVICE
            [Unit]
            Description=MergeOS production service
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            Environment=MERGEOS_ENV=production
            Environment=PORT=8080
            ExecStart=$APP_DIR/mergeos
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=default.target
            SERVICE
              systemctl --user daemon-reload
              systemctl --user enable mergeos.service
              systemctl --user restart mergeos.service
              systemctl --user is-active --quiet mergeos.service
            else
              pkill -f "$APP_DIR/mergeos" || true
              MERGEOS_ENV=production PORT=8080 nohup "$APP_DIR/mergeos" > "$APP_DIR/mergeos.log" 2> "$APP_DIR/mergeos.err.log" &
            fi
            if command -v sudo >/dev/null 2>&1; then
              if ! command -v nginx >/dev/null 2>&1; then
                sudo -n apt-get update
                sudo -n env DEBIAN_FRONTEND=noninteractive apt-get install -y nginx
              fi
              sudo -n tee /etc/nginx/sites-available/mergeos >/dev/null <<NGINX
            server {
              listen 80;
              listen [::]:80;
              server_name mergeos.shop uta.mergeos.shop _;
              root $APP_DIR/frontend/client;
              index index.html;
              client_max_body_size 30m;

              location /api/ {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location /assets/ {
                try_files \$uri =404;
                access_log off;
                expires 1h;
              }

              location / {
                try_files \$uri \$uri/ /index.html;
              }
            }
            NGINX
              sudo -n ln -sf /etc/nginx/sites-available/mergeos /etc/nginx/sites-enabled/mergeos
              sudo -n rm -f /etc/nginx/sites-enabled/default
              sudo -n nginx -t
              sudo -n systemctl enable nginx
              sudo -n systemctl restart nginx
              sudo -n systemctl is-active --quiet nginx
            fi
