name: Feature request
description: Suggest an improvement or new product capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
      placeholder: Describe the workflow pain or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should MergeOS do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Frontend
        - Admin
        - Scan explorer
        - Payments
        - Auth
        - Bounty workflow
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be complete?
      placeholder: |
        - Users can ...
        - The API returns ...
        - Tests cover ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Other approaches or tradeoffs.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and PRs.
          required: true
        - label: I did not include secrets, private keys, customer data, or sensitive production details.
          required: true
